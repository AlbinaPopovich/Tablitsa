<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер таблицы умножения (Демо)</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --orange-accent: #ff9f43; 
            --bright-teal: #007b7b;
            --green: #2ecc71;
            --red: #ff7675;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #app {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 95%;
            max-width: 420px;
            text-align: center;
        }

        h1 { font-weight: 700; margin-bottom: 30px; font-size: 1.4rem; text-transform: uppercase; }
        h2 { font-weight: 600; color: #636e72; margin-bottom: 25px; }

        /* Сетка только для двух кнопок */
        .grid-demo { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 25px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Оставили только 3 и 4 */
        .btn-3 { background-color: #ed0cad; } 
        .btn-4 { background-color: #ffec20; color: white !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .btn-mode { background-color: var(--bright-teal); width: 140px; padding: 20px 5px; font-size: 1.1rem; }
        .btn-back { background: none; border: 1px solid #dfe6e9; color: #b2bec3; padding: 10px 20px; margin-top: 30px; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-exit { border: 1px solid var(--red); color: var(--red); margin-top: 20px; width: 100%; padding: 12px; border-radius: 10px; background: none; cursor: pointer; font-weight: bold; text-transform: uppercase;}

        .example-text { font-size: 4.5rem; margin: 20px 0; font-weight: 800; }
        .btn-answer { background-color: var(--orange-accent); width: 160px; padding: 15px; margin: 0 auto; display: block; font-size: 1.2rem; }

        .answer-display { font-size: 4rem; color: var(--green); font-weight: bold; height: 90px; display: flex; justify-content: center; align-items: center; }

        #counter { font-size: 1rem; color: #b2bec3; margin-bottom: 15px; }
        .hidden { display: none; }
        .farewell { color: #b2bec3; font-style: italic; margin-bottom: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <h1>Таблица умножения</h1>
        <p style="color: #636e72; margin-bottom: 20px;">Выбери число для тренировки:</p>
        <div class="grid-demo">
            <button class="btn btn-3" onclick="selectNumber(3)">3</button>
            <button class="btn btn-4" onclick="selectNumber(4)">4</button>
        </div>
        <button class="btn-exit" onclick="exitGame()">Завершить игру</button>
    </div>

    <div id="mode-selection" class="hidden">
        <h2 id="selected-num-text"></h2>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-mode" onclick="setOrder('sequence')">По порядку</button>
            <button class="btn btn-mode" onclick="setOrder('random')">Вразброс</button>
        </div>
        <button class="btn-back" onclick="showMenu()">В МЕНЮ</button>
    </div>

    <div id="game" class="hidden">
        <div id="counter"><span id="counter-label">Пример</span> <span id="current-idx">1</span> <span id="total-idx-block">из <span id="total-idx">10</span></span></div>
        <div id="question" class="example-text">-- × --</div>
        <div id="answer-area" style="min-height: 150px;">
            <div id="answer-text" class="answer-display"></div>
            <button id="answer-btn" class="btn btn-answer" onclick="revealAnswer()">ОТВЕТ</button>
        </div>
        <button class="btn-back" onclick="showMenu()">В МЕНЮ</button>
    </div>

    <div id="exit-screen" class="hidden">
        <h1>Тренировка окончена</h1>
        <p class="farewell">Молодец! Пробуй снова!</p>
        <button class="btn" style="background: linear-gradient(45deg, #ff9f43, #ff6b6b); width: 100%; font-size: 1.2rem;" onclick="showMenu()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    let currentNum = 0, questions = [], currentIndex = 0, solvedCount = 0;
    let isInfinite = false, isProcessing = false;
    let history = []; 

    function showMenu() {
        hideAll();
        document.getElementById('menu').classList.remove('hidden');
        isProcessing = false;
        history = [];
    }

    function hideAll() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('mode-selection').classList.add('hidden');
        document.getElementById('game').classList.add('hidden');
        document.getElementById('exit-screen').classList.add('hidden');
    }

    function exitGame() {
        hideAll();
        document.getElementById('exit-screen').classList.remove('hidden');
    }

    function selectNumber(num) {
        currentNum = num;
        hideAll();
        document.getElementById('mode-selection').classList.remove('hidden');
        document.getElementById('selected-num-text').innerText = `Таблица на ${num}`;
    }

    function setOrder(mode) {
        if (mode === 'random') {
            isInfinite = true;
            document.getElementById('counter-label').innerText = "Решено:";
            document.getElementById('total-idx-block').classList.add('hidden');
        } else {
            isInfinite = false;
            questions = [];
            for (let i = 1; i <= 10; i++) questions.push({n1: currentNum, n2: i});
            document.getElementById('counter-label').innerText = "Пример";
            document.getElementById('total-idx-block').classList.remove('hidden');
        }
        startGame();
    }

    function startGame() {
        currentIndex = 0;
        solvedCount = 0;
        history = [];
        isProcessing = false;
        hideAll();
        document.getElementById('game').classList.remove('hidden');
        if (!isInfinite) document.getElementById('total-idx').innerText = questions.length;
        showQuestion();
    }

    function getUniqueRandom() {
        let n1 = currentNum, n2, key;
        let attempts = 0;
        while (attempts < 100) {
            n2 = Math.floor(Math.random() * 9) + 1;
            key = `${n1}x${n2}`;
            if (!history.includes(key)) {
                history.push(key);
                if (history.length > 5) history.shift();
                return { n1, n2 };
            }
            attempts++;
        }
        return { n1, n2: Math.floor(Math.random() * 9) + 1 };
    }

    function showQuestion() {
        let q;
        if (isInfinite) {
            q = getUniqueRandom();
            questions[0] = q; 
            document.getElementById('current-idx').innerText = solvedCount;
        } else {
            if (currentIndex >= questions.length) {
                exitGame(); // Последовательный режим заканчивается экраном финала
                return;
            }
            q = questions[currentIndex];
            document.getElementById('current-idx').innerText = currentIndex + 1;
        }
        document.getElementById('question').innerText = `${q.n1} × ${q.n2}`;
        document.getElementById('answer-text').innerText = "";
        document.getElementById('answer-btn').style.visibility = 'visible';
        isProcessing = false;
    }

    function revealAnswer() {
        if (isProcessing) return;
        isProcessing = true;

        const q = isInfinite ? questions[0] : questions[currentIndex];
        document.getElementById('answer-btn').style.visibility = 'hidden';

        setTimeout(() => {
            document.getElementById('answer-text').innerText = q.n1 * q.n2;
            setTimeout(() => {
                if (isInfinite) solvedCount++; else currentIndex++;
                showQuestion();
            }, 500); 
        }, 500); 
    }
</script>
</body>
</html>
